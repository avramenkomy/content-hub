services:
  db:
    image: postgres:16-alpine
    container_name: content_hub_prod_db
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - content_hub_prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: content_hub_prod_app
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  content_hub_prod_postgres_data: